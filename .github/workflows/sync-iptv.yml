name: Sync IPTV

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Sync playlist
      run: python3 scripts/sync_iptv.py

    - name: Commit changes
      run: |
        if git diff --quiet -- IPTV.m3u; then
          echo "IPTV.m3u is already current."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add IPTV.m3u
        git commit -m "chore: sync IPTV playlist"
        git push
